name: Classify Inbox

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at UTC 00:00
  workflow_dispatch: # Allow manual trigger

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Classify inbox files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python pipeline/classify_inbox.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "classify(inbox): auto-categorize inbox files"
          git push

      # Optional: Slack failure notification (set SLACK_WEBHOOK_URL secret to enable)
      - name: Notify Slack on failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: *Inbox classification failed* ($(date -u +%Y-%m-%d))\\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
